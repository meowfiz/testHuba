[filters]

# kryterium1 – filtrowanie plików po zawartości polskich liter
# Dopuszczalne wartości:
#   ma       – do łączenia trafiają TYLKO pliki zawierające polskie litery
#   nie_ma   – do łączenia trafiają TYLKO pliki BEZ polskich liter
#   ignoruj  – kryterium nieaktywne, wszystkie pliki są brane pod uwagę
kryterium1 = ma

# kryterium2 – maksymalny dopuszczalny procent braków (NaN) w kolumnie
# Kolumny, w których odsetek braków PRZEKRACZA tę wartość, są usuwane z pliku wynikowego.
# Zakres: 0.0 – 100.0
kryterium2 = 40.0
